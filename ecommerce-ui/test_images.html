<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Images - ShopHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            color: #6c757d;
            margin-bottom: 30px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            flex: 1;
            min-width: 200px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .image-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            border-color: #667eea;
        }

        .image-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: linear-gradient(45deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
        }

        .image-card-body {
            padding: 20px;
        }

        .image-card-body h5 {
            margin: 0 0 10px 0;
            color: #333;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .price {
            font-size: 1.5rem;
            color: #667eea;
            font-weight: bold;
            margin: 10px 0;
        }

        .category-badge {
            display: inline-block;
            padding: 5px 12px;
            background: #e7f1ff;
            color: #0d6efd;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .status i {
            font-size: 1.2rem;
        }

        .status.success {
            color: #198754;
        }

        .status.error {
            color: #dc3545;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .back-btn {
            display: inline-block;
            padding: 12px 25px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .back-btn:hover {
            background: #764ba2;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .back-btn i {
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">
            <i class="fas fa-arrow-left"></i>Back to Home
        </a>

        <h1><i class="fas fa-images"></i> Product Images Test</h1>
        <p class="subtitle">Testing all product images from Unsplash CDN</p>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-number" id="total-products">0</div>
                <div class="stat-label">Total Products</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="images-loaded">0</div>
                <div class="stat-label">Images Loaded</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="images-failed">0</div>
                <div class="stat-label">Failed to Load</div>
            </div>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading products...</p>
        </div>
        
        <div class="image-grid" id="imageGrid" style="display: none;"></div>
    </div>

    <script>
        let imagesLoaded = 0;
        let imagesFailed = 0;

        fetch('/products')
            .then(res => res.json())
            .then(products => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('imageGrid').style.display = 'grid';
                document.getElementById('total-products').textContent = products.length;

                const grid = document.getElementById('imageGrid');
                
                products.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'image-card';
                    
                    const img = new Image();
                    img.src = product.image || 'https://via.placeholder.com/400x300?text=No+Image';
                    
                    img.onload = function() {
                        imagesLoaded++;
                        document.getElementById('images-loaded').textContent = imagesLoaded;
                        card.innerHTML = `
                            <img src="${product.image}" alt="${product.name}">
                            <div class="image-card-body">
                                <span class="category-badge">${product.category || 'general'}</span>
                                <h5>${product.name}</h5>
                                <div class="price">$${product.price}</div>
                                <p style="color: #6c757d; font-size: 0.9rem; margin: 10px 0;">
                                    ${product.description}
                                </p>
                                <div class="status success">
                                    <i class="fas fa-check-circle"></i>
                                    <span>Image loaded successfully</span>
                                </div>
                                <div style="margin-top: 10px; font-size: 0.85rem; color: #6c757d;">
                                    Stock: ${product.stock} | ID: ${product.id}
                                </div>
                            </div>
                        `;
                    };
                    
                    img.onerror = function() {
                        imagesFailed++;
                        document.getElementById('images-failed').textContent = imagesFailed;
                        card.innerHTML = `
                            <img src="https://via.placeholder.com/400x300/dc3545/ffffff?text=Image+Error" alt="Error">
                            <div class="image-card-body">
                                <span class="category-badge">${product.category || 'general'}</span>
                                <h5>${product.name}</h5>
                                <div class="price">$${product.price}</div>
                                <p style="color: #6c757d; font-size: 0.9rem; margin: 10px 0;">
                                    ${product.description}
                                </p>
                                <div class="status error">
                                    <i class="fas fa-exclamation-circle"></i>
                                    <span>Failed to load image</span>
                                </div>
                                <div style="margin-top: 10px; font-size: 0.85rem; color: #6c757d;">
                                    Stock: ${product.stock} | ID: ${product.id}
                                </div>
                            </div>
                        `;
                    };
                    
                    grid.appendChild(card);
                });
            })
            .catch(error => {
                document.getElementById('loading').innerHTML = `
                    <i class="fas fa-exclamation-triangle" style="font-size: 4rem; color: #dc3545; margin-bottom: 20px;"></i>
                    <h3 style="color: #dc3545;">Error Loading Products</h3>
                    <p style="color: #6c757d;">Please make sure the Flask server is running.</p>
                    <button onclick="location.reload()" class="back-btn" style="margin-top: 20px;">
                        <i class="fas fa-redo"></i>Retry
                    </button>
                `;
            });
    </script>
</body>
</html>
